<!DOCTYPE html>
<html>
<head>
<title>Bus Route Finder</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/college.jpg") no-repeat center center fixed;
background-size:cover;
transition:0.4s;
}

/* 🌙 DARK MODE */
.dark{
background:#121212;
color:white;
}

/* Glass effect */
.overlay{
backdrop-filter: blur(8px);
background:rgba(255,255,255,0.5);
min-height:100vh;
}

.dark .overlay{
background:rgba(0,0,0,0.6);
}

.container{
text-align:center;
padding-top:80px;
}

/* Logo */
.logo{
width:100px;
border-radius:50%;
}

/* Title */
h1{
font-size:35px;
}

/* Search */
input{
padding:12px;
width:300px;
border:none;
border-radius:8px;
font-size:16px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* Suggestions */
#suggestions{
background:white;
width:300px;
margin:auto;
border-radius:8px;
max-height:150px;
overflow:auto;
}

.dark #suggestions{
background:#333;
color:white;
}

.suggest-item{
padding:8px;
cursor:pointer;
}

.suggest-item:hover{
background:#eee;
}

/* Loader */
.loader{
display:none;
margin-top:20px;
font-weight:bold;
}

/* Toggle */
.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
padding:10px;
background:#000;
color:white;
border-radius:8px;
}

.dark .toggle{
background:white;
color:black;
}

.footer{
margin-top:40px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="overlay">

<div class="container">

<img src="/static/logo.png" class="logo">

<h1>🚌 Bus Route Finder</h1>

<input type="text" id="search" placeholder="Search Bus / Stop">

<div id="suggestions"></div>

<div class="loader" id="loader">🔍 Searching...</div>

<div id="result"></div>

<div class="footer">
👨‍💻 Developed by Hershini S
</div>

</div>
</div>

<script>

let timer;

/* 🔍 Live Search + Loader */
function searchBus(){
clearTimeout(timer);

let q=document.getElementById("search").value;

if(q.length===0){
document.getElementById("result").innerHTML="";
document.getElementById("suggestions").innerHTML="";
return;
}

/* Loader */
document.getElementById("loader").style.display="block";

timer=setTimeout(()=>{
fetch("/search?q="+encodeURIComponent(q))
.then(res=>res.text())
.then(data=>{
document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML=data;
});
},300);

/* Suggestions */
fetch("/search?q="+encodeURIComponent(q))
.then(res=>res.text())
.then(data=>{
document.getElementById("suggestions").innerHTML=
"<div class='suggest-item'>"+q+"</div>";
});
}

/* Click suggestion */
document.getElementById("suggestions").onclick=(e)=>{
if(e.target.classList.contains("suggest-item")){
document.getElementById("search").value=e.target.innerText;
searchBus();
}
};

/* Dark mode */
function toggleDark(){
document.body.classList.toggle("dark");
}

document.getElementById("search").addEventListener("keyup",searchBus);

</script>

</body>
</html>
