<!DOCTYPE html>
<html>
<head>
<title>College Bus Route Finder</title>

<style>
body{
margin:0;
font-family: Arial;
background: url("/static/college.jpg") no-repeat center center fixed;
background-size: cover;
}

.overlay{
background: rgba(255,255,255,0.6);
min-height:100vh;
}

.container{
text-align:center;
padding-top:80px;
padding-bottom:40px;
}

.logo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
}

h1{
color:black;
font-size:35px;
margin:10px 0;
text-shadow:1px 1px 3px white;
}

.college{
color:black;
font-size:20px;
text-shadow:1px 1px 3px white;
}

.search-box{
margin-top:30px;
}

input{
padding:12px;
width:300px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

#result{
margin-top:30px;
}

.footer{
margin-top:40px;
text-align:center;
color:#000;
font-size:16px;
font-weight:bold;
}

@media(max-width:600px){
input{
width:80%;
}
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

<img src="/static/logo.png" class="logo">

<div class="college"><b>Panimalar Engineering College</b></div>

<h1>🚌 Bus Route Finder</h1>

<div class="search-box">
<input type="text" id="search" placeholder="Enter Bus / Stop / Number">
</div>

<div id="result"></div>

<div class="footer">
👨‍💻 Developed by Hershini S
</div>

</div>

</div>

<script>
let timer;

function searchBus(){
    clearTimeout(timer);

    let q = document.getElementById("search").value;

    if(q.length === 0){
        document.getElementById("result").innerHTML = "";
        return;
    }

    document.getElementById("result").innerHTML = "<b>🔍 Searching...</b>";

    timer = setTimeout(function(){
        fetch("/search?q=" + encodeURIComponent(q))
        .then(response => response.text())
        .then(data => {
            document.getElementById("result").innerHTML = data;
        });
    }, 300);
}

document.getElementById("search").addEventListener("keyup", searchBus);
</script>

</body>
</html>
